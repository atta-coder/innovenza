<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Innovenza - Transform your digital presence with our comprehensive digital marketing solutions. Expert web development, SEO, and digital strategy services." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://innovenza.com" />
    
    <!-- Open Graph Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Innovenza - Digital Marketing & Web Development Agency" />
    <meta property="og:description" content="Transform your digital presence with our comprehensive digital marketing solutions. Expert web development, SEO, and digital strategy services." />
    <meta property="og:image" content="https://innovenza.com/og-image.jpg" />
    <meta property="og:url" content="https://innovenza.com" />
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Innovenza - Digital Marketing & Web Development Agency" />
    <meta name="twitter:description" content="Transform your digital presence with our comprehensive digital marketing solutions. Expert web development, SEO, and digital strategy services." />
    <meta name="twitter:image" content="https://innovenza.com/twitter-card.jpg" />
    
    <title>Innovenza - Digital Marketing & Web Development Agency</title>
    
    <!-- Preload Critical Assets -->
    <link rel="preload" href="/fonts/inter-var.woff2" as="font" type="font/woff2" crossorigin />
    
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="max-age=3600" />
    
    <!-- Google Analytics -->
    <script>
      // Only load GA in production
      if (window.location.hostname !== 'localhost' && !window.location.hostname.includes('webcontainer')) {
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        // Replace with actual GA4 measurement ID when deploying
        gtag('config', 'G-XXXXXXXXXX', {
          send_page_view: false // Disable automatic page views
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
